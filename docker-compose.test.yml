name: links-test

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: >
      bash -c "export PATH=/usr/local/node/bin:$$PATH &&
      bundle install &&
      yarn install --frozen-lockfile &&
      yarn build:css &&
      ./bin/rails db:prepare &&
      ./bin/rails test"
    environment:
      RAILS_ENV: test
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: links_test
      REDIS_URL: redis://redis:6379/0
      LOCAL_AUTH_EMAIL: local@example.com
      LOCAL_AUTH_PASSWORD: secret
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
      - node_modules:/rails/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  bundle_cache:
  node_modules:
