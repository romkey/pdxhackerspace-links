name: links-server

services:
  web:
    image: ${LINKS_IMAGE:-ghcr.io/example/links:latest}
    ports:
      - "3000:80"
    environment:
      RAILS_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      APP_VERSION: ${APP_VERSION:-dev}
    depends_on:
      redis:
        condition: service_healthy

  sidekiq:
    image: ${LINKS_IMAGE:-ghcr.io/example/links:latest}
    command: bundle exec sidekiq
    environment:
      RAILS_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      APP_VERSION: ${APP_VERSION:-dev}
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:8
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    profiles: ["tools"]
    image: ${LINKS_IMAGE:-ghcr.io/example/links:latest}
    command: ./bin/rails db:prepare
    environment:
      RAILS_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    restart: "no"
